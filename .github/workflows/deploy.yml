name: Deploy HireWalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Full Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          envs: DB_HOST,DB_USER,DB_PASSWORD,JWT_SECRET,SMTP_USER,SMTP_PASSWORD,GROQ_API_KEY,CF_URL
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            echo "====== STEP 1: Install System Packages ======"
            sudo yum install -y python3 python3-pip git mysql 2>/dev/null || true
            sudo amazon-linux-extras install nginx1 -y 2>/dev/null || true

            echo "====== STEP 2: Clone or Pull Repo ======"
            if [ -d "/home/ec2-user/hackathon-projecct/.git" ]; then
              cd /home/ec2-user/hackathon-projecct
              git fetch origin
              git reset --hard origin/main
            else
              cd /home/ec2-user
              git clone https://github.com/Ranjit-08/hackathon-projecct.git
              cd hackathon-projecct
            fi

            echo "====== STEP 3: Install Python Packages ======"
            pip3 install \
              flask==2.2.5 flask-cors==3.0.10 pymysql==1.1.0 \
              python-dotenv==0.21.1 PyJWT==2.6.0 bcrypt==4.0.1 \
              requests==2.28.2 gunicorn==20.1.0 Werkzeug==2.2.3 \
              --user -q

            echo "====== STEP 4: Write .env ======"
            cat > /home/ec2-user/hackathon-projecct/backend/.env << ENVEOF
            DB_HOST=$DB_HOST
            DB_PORT=3306
            DB_NAME=walkin_platform
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            JWT_SECRET=$JWT_SECRET
            SMTP_HOST=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USER=$SMTP_USER
            SMTP_PASSWORD=$SMTP_PASSWORD
            GROQ_API_KEY=$GROQ_API_KEY
            GROQ_MODEL=llama-3.3-70b-versatile
            DEBUG=False
            PORT=5000
            FRONTEND_URL=$CF_URL
            ENVEOF

            echo "====== STEP 5: Verify .env has values ======"
            # Fail fast if DB_HOST is empty — prevents a silent 500 on startup
            grep -q "DB_HOST=." /home/ec2-user/hackathon-projecct/backend/.env \
              || { echo "ERROR: DB_HOST is empty in .env — check GitHub secrets" >&2; exit 1; }

            echo "====== STEP 6: Init Database ======"
            TABLE_COUNT=$(mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASSWORD" \
              walkin_platform -se \
              "SELECT COUNT(*) FROM information_schema.tables \
               WHERE table_schema='walkin_platform';" 2>/dev/null || echo "0")
            if [ "$TABLE_COUNT" = "0" ]; then
              echo "Bootstrapping schema..."
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASSWORD" walkin_platform \
                < /home/ec2-user/hackathon-projecct/database/schema.sql
            else
              echo "Schema exists ($TABLE_COUNT tables) — skipping."
            fi

            echo "====== STEP 7: Deploy Frontend ======"
            # api.js already has API_BASE = '/api' committed in the repo.
            # No sed patching needed — relative URL works on any domain.
            sudo mkdir -p /var/www/walkin-frontend
            sudo cp -r /home/ec2-user/hackathon-projecct/frontend/* /var/www/walkin-frontend/
            sudo chown -R nginx:nginx /var/www/walkin-frontend

            echo "====== STEP 8: Setup Nginx ======"
            sudo bash -c 'cat > /etc/nginx/conf.d/walkin.conf << NGINXEOF
            server {
                listen 80;
                server_name _;

                location /api/ {
                    proxy_pass http://127.0.0.1:5000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_read_timeout 60s;
                }

                location / {
                    root /var/www/walkin-frontend;
                    index index.html;
                    try_files \$uri \$uri/ /index.html;
                }
            }
            NGINXEOF'

            echo "====== STEP 9: Setup Systemd Service ======"
            GUNICORN=$(which gunicorn)
            echo "Gunicorn path: $GUNICORN"
            sudo bash -c "cat > /etc/systemd/system/walkin.service << SVCEOF
            [Unit]
            Description=HireWalk API
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/hackathon-projecct/backend
            Environment=PATH=/home/ec2-user/.local/bin:/usr/local/bin:/usr/bin:/bin
            ExecStart=$GUNICORN --workers 3 --bind 0.0.0.0:5000 app:app
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            SVCEOF"

            echo "====== STEP 10: Start Services ======"
            sudo systemctl daemon-reload
            sudo systemctl enable walkin
            sudo systemctl restart walkin
            sudo systemctl enable nginx
            sudo nginx -t && sudo systemctl restart nginx

            echo "====== STEP 11: Health Check ======"
            for i in $(seq 1 10); do
              if curl -sf http://localhost:5000/api/health; then
                echo " Backend OK"
                break
              fi
              echo "Attempt $i/10 - retrying in 3s..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo " Backend FAILED — last 50 journal lines:" >&2
                sudo journalctl -u walkin -n 50 --no-pager >&2
                exit 1
              fi
            done

            curl -sf http://localhost/api/health && echo " Nginx proxy OK" || echo " Nginx proxy FAILED"
            echo "====== DEPLOY COMPLETE ======"