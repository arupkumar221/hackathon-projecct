<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — HireWalk</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-grid"></div>
    <div class="auth-left-content">
      <a href="../index.html" class="auth-logo" style="margin-bottom:48px">
        <div class="auth-logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
        HireWalk
      </a>
      <h2>Welcome back. Your next opportunity awaits.</h2>
      <p style="margin-top:16px">Sign in to browse live walk-in interviews and manage your bookings.</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-form">
      <a href="../index.html" class="auth-logo">
        <div class="auth-logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
        HireWalk
      </a>
      <h2>Sign In</h2>
      <p class="subtitle">Access your candidate dashboard</p>
      <div id="alert-box"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" id="email" type="email" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" id="password" type="password" placeholder="Your password"/>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" id="login-btn" onclick="login()">Sign In</button>
      <p style="text-align:center;margin-top:20px;font-size:.8rem;color:var(--muted)">
        No account? <a href="register.html" style="color:var(--accent);font-weight:600">Create one free</a>
      </p>
      <p style="text-align:center;margin-top:6px;font-size:.8rem;color:var(--muted)">
        Company? <a href="../company/login.html" style="color:var(--accent);font-weight:600">Sign in here</a>
      </p>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  Auth.redirectIfLoggedIn();
  async function login() {
    const btn = document.getElementById('login-btn'), box = document.getElementById('alert-box');
    const email = document.getElementById('email').value.trim(), password = document.getElementById('password').value;
    if (!email || !password) return showAlert(box, 'Email and password are required');
    setLoading(btn, true, 'Signing in...');
    try {
      const res = await Api.userLogin({ email, password });
      Auth.save(res.token, res.user);
      location.href = 'browse.html';
    } catch (err) { showAlert(box, err.message); }
    finally { setLoading(btn, false); }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
